name: "KITTI sensor fusion"
description: "Sensor fusion on KITTI sequence"

# Configuration references
dataset: configs/dataset_config/kitti_dataset_config.yaml

filter: configs/filter_config/kitti/filter_base.yaml

# Visualization settings
visualization: configs/visualization_config/kitti_visualization_base.yaml

# Visual odometry settings
visual_odometry: configs/visual_odometry_config/kitti_vo_base.yaml

# General settings
general:
  log_level: debug
  log_sensor_data: True
  save_sensor_data: True
  save_estimation: True
  save_output_debug_frames: True
  sensor_data_output_filepath: ./outputs/test/KITTI/seq07_ekf/sensor_out.txt
  sensor_data_save_path: ./outputs/test/KITTI/seq07_ekf/sensor_data

# Report settings
report:
  export_error: True
  error_output_root_path: ./outputs/test/KITTI/seq07_ekf
  location_only: False
